<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Senza Giri Travel</title>
  <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
  <main class="section builder-section">
    <div class="section-title center">
      <span class="kicker">Planner automatico</span>
      <h1>Senza Giri Travel</h1>
      <p>Compila il viaggio e genera subito un itinerario nella pagina.</p>
    </div>

    <form id="tripForm" class="travel-form">
      <div class="form-card big-card">
        <div class="card-head"><span class="icon-badge">1</span><div><h3>Dati base</h3><p>Voli, hotel e base del viaggio.</p></div></div>
        <label>Destinazione <input id="destination" type="text" placeholder="Es. Tirana" required></label>
        <label>Hotel o base <input id="hotel" type="text" placeholder="Nome hotel o zona"></label>
        <div class="two-columns">
          <label>Ora arrivo volo nella destinazione <input id="arrival" type="datetime-local"></label>
          <label>Ora partenza volo di rientro <input id="departure" type="datetime-local"></label>
        </div>
      </div>

      <div class="form-card dark-card">
        <div class="card-head"><span class="icon-badge">2</span><div><h3>Tappe</h3><p>Una tappa per riga.</p></div></div>
        <label>Tappe desiderate <textarea id="places" rows="10" placeholder="Piazza principale&#10;Museo&#10;Parco&#10;Ristorante tipico"></textarea></label>
        <label>Prenotazioni <textarea id="bookings" rows="5" placeholder="Giovedi 21:30 cena prenotata"></textarea></label>
        <label>Appunti e fonti <textarea id="sources" rows="5" placeholder="Incolla luoghi trovati online"></textarea></label>
      </div>

      <div class="form-card full-width preference-card">
        <div class="card-head"><span class="icon-badge">3</span><div><h3>Preferenze</h3><p>Ritmo e stile.</p></div></div>
        <div class="two-columns">
          <label>Ritmo <select id="pace"><option>Rilassato</option><option selected>Normale</option><option>Intenso</option></select></label>
          <label>Mezzi <select id="transport"><option>A piedi</option><option selected>A piedi e mezzi pubblici</option><option>Taxi</option><option>Auto</option></select></label>
        </div>
        <div class="checkbox-grid">
          <label><input type="checkbox" name="interest" value="cultura"> Cultura</label>
          <label><input type="checkbox" name="interest" value="cibo"> Cibo</label>
          <label><input type="checkbox" name="interest" value="sera"> Sera</label>
          <label><input type="checkbox" name="interest" value="shopping"> Shopping</label>
          <label><input type="checkbox" name="interest" value="foto"> Foto</label>
          <label><input type="checkbox" name="interest" value="relax"> Relax</label>
        </div>
        <label>Note personali <textarea id="extraNotes" rows="4" placeholder="Preferenze personali"></textarea></label>
        <button class="button primary wide" type="submit">Genera itinerario</button>
      </div>
    </form>

    <section id="result" class="result hidden">
      <div class="result-header">
        <div><span class="kicker">Itinerario</span><h2>Itinerario generato</h2></div>
        <button id="copyPrompt" class="button ghost" type="button">Copia dati</button>
      </div>
      <div id="itineraryBox" class="itinerary-box"></div>
      <textarea id="promptOutput" class="hidden" readonly></textarea>
    </section>
  </main>
  <script src="script.js?v=11"></script>
</body>
</html>
